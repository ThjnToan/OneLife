      <stop offset="0.5" stop-color="#ff7ad9"/>
      <stop offset="1" stop-color="#a06bff"/>
    </linearGradient>
    <linearGradient id="glowRing" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
