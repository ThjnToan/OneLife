<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bodyGrad" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb3e6"/>
      <stop offset="0.5" stop-color="#ff7ad9"/>
      <stop offset="1" stop-color="#a06bff"/>
    </linearGradient>
    <radialGradient id="cheekGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(20 36) scale(3)">
      <stop offset="0" stop-color="#ff6fb5" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ff6fb5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cheekGrad2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(44 36) scale(3)">
      <stop offset="0" stop-color="#ff6fb5" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ff6fb5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e0ff"/>
      <stop offset="0.5" stop-color="#ff3ea5"/>
      <stop offset="1" stop-color="#ffd23f"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#glowGrad)" opacity="0.55" filter="url(#softGlow)"/>

  <!-- Main body with chunky pixel-ish border -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="#1a0b3d"/>
  <rect x="5.5" y="5.5" width="53" height="53" rx="12.5" fill="url(#bodyGrad)"/>

  <!-- Highlight gloss -->
  <path d="M 12 10 Q 28 6 44 12 L 42 18 Q 28 13 14 18 Z" fill="#ffffff" opacity="0.45"/>

  <!-- Kawaii face: big anime eyes -->
  <ellipse cx="22" cy="34" rx="5" ry="6.5" fill="#1a0b3d"/>
  <ellipse cx="42" cy="34" rx="5" ry="6.5" fill="#1a0b3d"/>
  <ellipse cx="23.2" cy="31.8" rx="1.8" ry="2.2" fill="#ffffff"/>
  <ellipse cx="43.2" cy="31.8" rx="1.8" ry="2.2" fill="#ffffff"/>
  <circle cx="20.5" cy="35.5" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="40.5" cy="35.5" r="0.8" fill="#ffffff" opacity="0.7"/>

  <!-- Kawaii blush cheeks -->
  <ellipse cx="20" cy="36" rx="4" ry="2.2" fill="url(#cheekGrad)"/>
  <ellipse cx="44" cy="36" rx="4" ry="2.2" fill="url(#cheekGrad2)"/>

  <!-- Tiny smile -->
  <path d="M 28 41 Q 32 45 36 41" stroke="#1a0b3d" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- Cat-ear / star antennas -->
  <path d="M 18 12 L 22 4 L 26 12 Z" fill="url(#bodyGrad)" stroke="#1a0b3d" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M 38 12 L 42 4 L 46 12 Z" fill="url(#bodyGrad)" stroke="#1a0b3d" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Sparkle stars around -->
  <g fill="#ffd23f" stroke="#1a0b3d" stroke-width="0.6">
    <path d="M 50 22 L 51 24 L 53 24.5 L 51 25 L 50 27 L 49 25 L 47 24.5 L 49 24 Z"/>
    <path d="M 12 50 L 12.7 51.4 L 14.2 51.7 L 12.7 52 L 12 53.4 L 11.3 52 L 9.8 51.7 L 11.3 51.4 Z"/>
  </g>
  <circle cx="14" cy="22" r="1.2" fill="#00e0ff"/>
  <circle cx="52" cy="46" r="1.4" fill="#ff3ea5"/>
</svg>
